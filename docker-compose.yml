services:
  growthbook:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      DATA_DIR: /app/data
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    volumes:
      - growthbook-data:/app/data

volumes:
  growthbook-data:
